<svg width="860" height="120" viewBox="0 0 860 120" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121A30"/>
      <stop offset="45%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#070B14"/>
    </linearGradient>
    <linearGradient id="fbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="fline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <radialGradient id="fglowC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fglowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FB923C" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </radialGradient>
    <filter id="fsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="fgrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#5EEAD4" stroke-opacity="0.05" stroke-width="0.6"/>
    </pattern>
    <clipPath id="fframe"><rect width="860" height="120"/></clipPath>
  </defs>

  <g clip-path="url(#fframe)">
    <rect width="860" height="120" fill="url(#fbg)"/>
    <rect width="860" height="120" fill="url(#fgrid)"/>
    <ellipse cx="200" cy="60" rx="240" ry="120" fill="url(#fglowC)"/>
    <ellipse cx="700" cy="60" rx="220" ry="120" fill="url(#fglowA)"/>

    <rect width="860" height="3" fill="url(#fbar)"/>
    <rect y="117" width="860" height="3" fill="url(#fbar)"/>

    <!-- ===== Pulse divider (echo of header's data line) ===== -->
    <path d="M40,32 L120,26 L200,35 L280,22 L360,32 L440,16 L520,32 L600,26 L680,36 L760,22 L820,30"
      fill="none" stroke="url(#fline)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      pathLength="1" stroke-dasharray="1 1" stroke-dashoffset="1" filter="url(#fsoft)">
      <animate attributeName="stroke-dashoffset" from="1" to="0" dur="1.6s" begin="0.2s" fill="freeze"/>
    </path>
    <circle cx="820" cy="30" r="3.2" fill="#FDBA74" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.8s" fill="freeze"/>
      <animate attributeName="r" values="3.2;6;3.2" dur="2s" begin="1.8s" repeatCount="indefinite"/>
    </circle>

    <!-- ===== Closing line ===== -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.7s" fill="freeze"/>
      <text x="430" y="62" text-anchor="middle" font-family="ui-monospace,'SF Mono',Consolas,monospace"
        font-size="14" font-weight="600"><tspan fill="#FB923C">&gt; </tspan><tspan fill="#E2E8F0">thanks for scrolling</tspan><tspan fill="#64748B"> — </tspan><tspan fill="#5EEAD4">let's connect</tspan></text>
    </g>
    <rect x="589" y="52" width="8" height="14" fill="#FB923C" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.5s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1" dur="1s" begin="1.6s" repeatCount="indefinite"/>
    </rect>

    <!-- ===== Contact endpoints (editable) ===== -->
    <g opacity="0" font-family="ui-monospace,Consolas,monospace" font-size="11.5" font-weight="700">
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="1.1s" fill="freeze"/>

      <rect x="221" y="74" width="130" height="24" rx="12" fill="#22D3EE" fill-opacity="0.10"
        stroke="#22D3EE" stroke-opacity="0.5" stroke-width="0.9"/>
      <text x="286" y="90" text-anchor="middle" fill="#67E8F9" letter-spacing="0.3">&lt;/&gt; GitHub</text>

      <rect x="365" y="74" width="130" height="24" rx="12" fill="#8B5CF6" fill-opacity="0.12"
        stroke="#8B5CF6" stroke-opacity="0.5" stroke-width="0.9"/>
      <text x="430" y="90" text-anchor="middle" fill="#C4B5FD" letter-spacing="0.3">in · LinkedIn</text>

      <rect x="509" y="74" width="130" height="24" rx="12" fill="#FB923C" fill-opacity="0.10"
        stroke="#FB923C" stroke-opacity="0.5" stroke-width="0.9"/>
      <text x="574" y="90" text-anchor="middle" fill="#FDBA74" letter-spacing="0.3">✉ Email</text>
    </g>

    <!-- ===== Copyright ===== -->
    <text x="430" y="111" text-anchor="middle" font-family="ui-monospace,Consolas,monospace"
      font-size="10.5" fill="#64748B" opacity="0">
      © 2025 · Miguel Angel Bolívar · built with code &amp; data
      <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.4s" fill="freeze"/>
    </text>
  </g>
</svg>
