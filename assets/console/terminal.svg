<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Cascadia Code, SF Mono, Menlo, Consolas, monospace">

  <!-- Sombra y ventana -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#161620"/>
    </linearGradient>
    <linearGradient id="titlebar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a3e"/>
      <stop offset="100%" stop-color="#26263a"/>
    </linearGradient>
  </defs>

  <g filter="url(#shadow)">
    <rect x="10" y="10" width="680" height="360" rx="14" fill="url(#bg)" stroke="#33334a" stroke-width="1"/>

    <!-- Barra de título -->
    <rect x="10" y="10" width="680" height="38" rx="14" fill="url(#titlebar)"/>
    <rect x="10" y="34" width="680" height="14" fill="url(#titlebar)"/>
    
    <circle cx="34" cy="29" r="6.5" fill="#ff5f56" opacity="0.9"/>
    <circle cx="34" cy="29" r="3" fill="#ff8a80" opacity="0.3"/>
    <circle cx="56" cy="29" r="6.5" fill="#ffbd2e" opacity="0.9"/>
    <circle cx="56" cy="29" r="3" fill="#ffd54f" opacity="0.3"/>
    <circle cx="78" cy="29" r="6.5" fill="#27c93f" opacity="0.9"/>
    <circle cx="78" cy="29" r="3" fill="#69f0ae" opacity="0.3"/>
    
    <text x="350" y="34" text-anchor="middle" fill="#9a9ab0" font-size="13" font-weight="500">
      <tspan fill="#6272a4">⌘</tspan> miguel@profile: ~
    </text>
  </g>

  <!-- Contenido de la terminal -->
  <g font-size="14.5" fill="#d6d6e7">

    <!-- Prompt inicial -->
    <text x="32" y="80">
      <tspan fill="#27c93f">miguel@profile</tspan><tspan fill="#9a9ab0">:~$ </tspan>
    </text>

    <!-- ===== COMANDO SE ESCRIBE LETRA POR LETRA ===== -->
    <text x="174" y="80" fill="#ffffff">
      <!-- Letra "c" -->
      <tspan opacity="0">c<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.5s" fill="freeze"/></tspan>
      <!-- Letra "d" -->
      <tspan opacity="0">d<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.6s" fill="freeze"/></tspan>
      <!-- Espacio -->
      <tspan opacity="0">&#160;<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.7s" fill="freeze"/></tspan>
      <!-- Letra "c" -->
      <tspan opacity="0">c<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.8s" fill="freeze"/></tspan>
      <!-- Letra "u" -->
      <tspan opacity="0">u<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="0.9s" fill="freeze"/></tspan>
      <!-- Letra "r" -->
      <tspan opacity="0">r<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.0s" fill="freeze"/></tspan>
      <!-- Letra "s" -->
      <tspan opacity="0">s<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.1s" fill="freeze"/></tspan>
      <!-- Letra "o" -->
      <tspan opacity="0">o<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.2s" fill="freeze"/></tspan>
      <!-- Letra "s" -->
      <tspan opacity="0">s<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.3s" fill="freeze"/></tspan>
      <!-- Espacio -->
      <tspan opacity="0">&#160;<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.4s" fill="freeze"/></tspan>
      <!-- Símbolo "&" -->
      <tspan opacity="0">&amp;<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.5s" fill="freeze"/></tspan>
      <!-- Símbolo "&" -->
      <tspan opacity="0">&amp;<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.6s" fill="freeze"/></tspan>
      <!-- Espacio -->
      <tspan opacity="0">&#160;<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.7s" fill="freeze"/></tspan>
      <!-- Letra "l" -->
      <tspan opacity="0">l<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.8s" fill="freeze"/></tspan>
      <!-- Letra "s" -->
      <tspan opacity="0">s<animate attributeName="opacity" from="0" to="1" dur="0.05s" begin="1.9s" fill="freeze"/></tspan>
    </text>

    <!-- ===== CONTENIDO APARECE DE GOLPE DESPUÉS DEL COMANDO ===== -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.2s" fill="freeze"/>
      
      <!-- Header -->
      <text x="32" y="108" fill="#6272a4" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
      <text x="32" y="128" fill="#8be9fd" font-size="13" font-weight="bold">📜 CURSOS CERTIFICADOS</text>
      <text x="32" y="148" fill="#6272a4" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
      
      <!-- Cursos -->
      <text x="32" y="172">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Excel Analytics con IA y Python</tspan>
        <tspan fill="#6272a4" dx="175" font-size="12">Platzi · Abr 2026</tspan>
      </text>
      
      <text x="32" y="196">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Business Intelligence: Utilidad y Áreas de Oportunidad</tspan>
        <tspan fill="#6272a4" dx="28" font-size="12">Platzi · Abr 2026</tspan>
      </text>
      
      <text x="32" y="220">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Power BI + Inteligencia Artificial</tspan>
        <tspan fill="#6272a4" dx="171" font-size="12">Daxus · Ene 2026</tspan>
      </text>
      
      <text x="32" y="244">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Foundational C# with Microsoft</tspan>
        <tspan fill="#6272a4" dx="173" font-size="12">freeCodeCamp · Abr 2026</tspan>
      </text>
      
      <text x="32" y="268">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Fundamentos de .NET</tspan>
        <tspan fill="#6272a4" dx="233" font-size="12">Platzi · Jul 2025</tspan>
      </text>
      
      <text x="32" y="292">
        <tspan fill="#50fa7b">-</tspan>
        <tspan fill="#f8f8f2" dx="20">Administrador de Bases de Datos Relacionales</tspan>
        <tspan fill="#6272a4" dx="78" font-size="12">CarlosSlim · Ago 2024</tspan>
      </text>
      
      <text x="32" y="316" fill="#6272a4" font-size="12">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>
    </g>

    <!-- ===== NUEVA LÍNEA CON CURSOR PARPADEANTE ===== -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="2.5s" fill="freeze"/>
      
      <text x="32" y="344">
        <tspan fill="#27c93f">miguel@profile</tspan><tspan fill="#9a9ab0">:~$ </tspan>
      </text>
      
      <!-- Cursor parpadeante -->
      <rect x="170" y="331" width="8" height="16" fill="#ffffff">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="2.5s"/>
      </rect>
    </g>

  </g>
</svg>
