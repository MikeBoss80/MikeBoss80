<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      @keyframes float1 {
        0% { transform: translate(0px, 0px) scale(1); }
        50% { transform: translate(150px, 80px) scale(1.2); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      @keyframes float2 {
        0% { transform: translate(0px, 0px) scale(1.1); }
        50% { transform: translate(-120px, -60px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1.1); }
      }
      @keyframes float3 {
        0% { transform: translate(0px, 0px) scale(0.9); }
        50% { transform: translate(80px, -100px) scale(1.3); }
        100% { transform: translate(0px, 0px) scale(0.9); }
      }
      .glow-sphere-1 { animation: float1 16s infinite ease-in-out; }
      .glow-sphere-2 { animation: float2 20s infinite ease-in-out; }
      .glow-sphere-3 { animation: float3 24s infinite ease-in-out; }
    </style>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070c18"/>
      <stop offset="100%" stop-color="#02040a"/>
    </linearGradient>

    <radialGradient id="radialCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2496ED" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2496ED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radialPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="radialPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="barSpanish" x1="0" x2="1">
      <stop offset="0%" stop-color="#2496ED"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <linearGradient id="barEnglish" x1="0" x2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="circle-view">
      <circle cx="15" cy="15" r="14" />
    </clipPath>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="16"/>

  <g filter="blur(40px)" style="mix-blend-mode: screen;">
    <circle class="glow-sphere-1" cx="200" cy="150" r="180" fill="url(#radialCyan)"/>
    <circle class="glow-sphere-2" cx="700" cy="280" r="220" fill="url(#radialPurple)"/>
    <circle class="glow-sphere-3" cx="450" cy="80" r="150" fill="url(#radialPink)"/>
  </g>

  <g stroke="#2496ED" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M20 40 L20 20 L40 20"/>
    <path d="M880 40 L880 20 L860 20"/>
    <path d="M20 380 L20 400 L40 400"/>
    <path d="M880 380 L880 400 L860 400"/>
  </g>

  <g transform="translate(40, 50)">
    <text x="0" y="0" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">
      🌍 Idiomas
    </text>
    <line x1="0" y1="15" x2="180" y2="15" stroke="#2496ED" stroke-width="2" opacity="0.6"/>

    <g transform="translate(0, 50)">
      <g clip-path="url(#circle-view)">
        <rect x="1" y="1" width="28" height="28" fill="#AA151B" />
        <rect x="1" y="8" width="28" height="12" fill="#F1BF00" />
      </g>
      <circle cx="15" cy="15" r="14" fill="#2496ED" opacity="0.1" stroke="#2496ED" stroke-width="1"/>
      
      <text x="45" y="15" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Español</text>
      <text x="45" y="35" fill="#8a93b2" font-family="Segoe UI, sans-serif" font-size="12">Nativo · C2</text>
      <rect x="45" y="45" width="300" height="6" rx="3" fill="#1a2238"/>
      <rect x="45" y="45" width="300" height="6" rx="3" fill="url(#barSpanish)" filter="url(#glow)"/>
      <text x="355" y="52" fill="#00D4FF" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700">100%</text>
    </g>

    <g transform="translate(0, 130)">
      <g clip-path="url(#circle-view)">
        <rect x="1" y="1" width="28" height="28" fill="#B22234" />
        <rect x="1" y="5" width="28" height="4" fill="#FFFFFF" />
        <rect x="1" y="13" width="28" height="4" fill="#FFFFFF" />
        <rect x="1" y="21" width="28" height="4" fill="#FFFFFF" />
        <rect x="1" y="1" width="14" height="14" fill="#3C3B6E" />
      </g>
      <circle cx="15" cy="15" r="14" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="1"/>
      
      <text x="45" y="15" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="16" font-weight="600">Inglés</text>
      <text x="45" y="35" fill="#8a93b2" font-family="Segoe UI, sans-serif" font-size="12">Avanzado · B2</text>
      <rect x="45" y="45" width="300" height="6" rx="3" fill="#1a2238"/>
      <rect x="45" y="45" width="255" height="6" rx="3" fill="url(#barEnglish)" filter="url(#glow)"/>
      <text x="355" y="52" fill="#EC4899" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700">80%</text>
    </g>
  </g>

  <line x1="450" y1="60" x2="450" y2="360" stroke="#2496ED" stroke-width="1" opacity="0.2" stroke-dasharray="4 4"/>

  <g transform="translate(490, 50)">
    <text x="0" y="0" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="22" font-weight="700">
      💪 Soft Skills
    </text>
    <line x1="0" y1="15" x2="200" y2="15" stroke="#8B5CF6" stroke-width="2" opacity="0.6"/>

    <g transform="translate(0, 50)">
      <circle cx="15" cy="15" r="14" fill="#2496ED" opacity="0.2"/>
      <text x="15" y="21" text-anchor="middle" fill="#ffffff" font-size="16">🎯</text>
      <text x="45" y="20" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">Liderazgo Técnico</text>
    </g>

    <g transform="translate(0, 100)">
      <circle cx="15" cy="15" r="14" fill="#00D4FF" opacity="0.2"/>
      <text x="15" y="21" text-anchor="middle" fill="#ffffff" font-size="16">🤝</text>
      <text x="45" y="20" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">Trabajo en Equipo</text>
    </g>

    <g transform="translate(0, 150)">
      <circle cx="15" cy="15" r="14" fill="#8B5CF6" opacity="0.2"/>
      <text x="15" y="21" text-anchor="middle" fill="#ffffff" font-size="16">💬</text>
      <text x="45" y="20" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">Comunicación Efectiva</text>
    </g>

    <g transform="translate(0, 200)">
      <circle cx="15" cy="15" r="14" fill="#EC4899" opacity="0.2"/>
      <text x="15" y="21" text-anchor="middle" fill="#ffffff" font-size="16">⚡</text>
      <text x="45" y="20" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">Autonomía y Gestión</text>
    </g>

    <g transform="translate(0, 250)">
      <circle cx="15" cy="15" r="14" fill="#06B6D4" opacity="0.2"/>
      <text x="15" y="21" text-anchor="middle" fill="#ffffff" font-size="16">🚀</text>
      <text x="45" y="20" fill="#ffffff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="600">Orientación a Resultados</text>
    </g>
  </g>
</svg>
