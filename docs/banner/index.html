<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Let's Connect – Banner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="banner" role="banner">
    <div class="banner__glow" aria-hidden="true"></div>
    <div class="banner__content">
      
      <!-- WRAPPER para las dos capas del texto -->
      <div class="banner__headline-wrapper">
        
        <!-- CAPA 1: Imagen estática centrada -->
        <h1 class="banner__headline banner__headline--image" aria-label="Let's Connect!">
          <span class="line">LET'S</span>
          <span class="line">CONNECT!</span>
        </h1>
        
        <!-- CAPA 2: Brillo animado (se superpone) -->
        <h1 class="banner__headline banner__headline--shine" aria-hidden="true">
          <span class="line">LET'S</span>
          <span class="line">CONNECT!</span>
        </h1>
        
      </div>
      
      <span class="banner__sub">Open to opportunities &nbsp;·&nbsp; Let's build something great</span>
    </div>
  </section>
</body>
</html>
