<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 840" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Fondos -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#141428"/>
    </linearGradient>

    <!-- Gradiente del path principal -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="40%"  stop-color="#FF8E53"/>
      <stop offset="70%"  stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Gradientes de cards -->
    <linearGradient id="cg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B6B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FF8E53" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4ECDC4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#44B39D" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="cg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.04"/>
    </linearGradient>

    <!-- Gradiente title -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B6B"/>
      <stop offset="50%"  stop-color="#4ECDC4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- ── FONDO ── -->
  <rect width="1100" height="840" fill="url(#bgGrad)" rx="18"/>

  <!-- Puntos decorativos fondo -->
  <g fill="white" opacity="0.04">
    <circle cx="80"  cy="80"  r="2"/><circle cx="260" cy="40"  r="1.5"/>
    <circle cx="460" cy="130" r="2"/><circle cx="660" cy="60"  r="1.5"/>
    <circle cx="880" cy="170" r="2"/><circle cx="160" cy="270" r="1.5"/>
    <circle cx="780" cy="370" r="2"/><circle cx="380" cy="470" r="1.5"/>
    <circle cx="580" cy="570" r="2"/><circle cx="90"  cy="660" r="1.5"/>
    <circle cx="980" cy="470" r="2"/><circle cx="940" cy="680" r="1.5"/>
    <circle cx="140" cy="790" r="2"/><circle cx="500" cy="760" r="1.5"/>
    <circle cx="720" cy="740" r="2"/><circle cx="1020" cy="680" r="1.5"/>
  </g>

  <!-- ── TÍTULO ── -->
  <text x="550" y="52" text-anchor="middle" fill="url(#titleGrad)"
        font-size="28" font-weight="700" letter-spacing="4">RUTA PROFESIONAL</text>
  <text x="550" y="76" text-anchor="middle" fill="#666688"
        font-size="11" letter-spacing="6">MI CAMINO EN EL DESARROLLO · 2024 — 2026</text>
  <rect x="375" y="88" width="350" height="1.5" rx="1" fill="url(#pathGrad)" opacity="0.4"/>

  <!-- ── PATH DE RUTA (glow) ── -->
  <path d="M 62 760 Q 200 760,300 610 Q 400 450,530 440 Q 640 430,740 300 Q 830 180,960 168"
        fill="none" stroke="url(#pathGrad)" stroke-width="12" opacity="0.08"/>

  <!-- ── PATH DE RUTA (línea principal animada) ── -->
  <path d="M 62 760 Q 200 760,300 610 Q 400 450,530 440 Q 640 430,740 300 Q 830 180,960 168"
        fill="none" stroke="url(#pathGrad)" stroke-width="2.5" opacity="0.9"
        stroke-dasharray="2000" stroke-dashoffset="2000">
    <animate attributeName="stroke-dashoffset" from="2000" to="0"
             dur="2s" begin="0.2s" fill="freeze" calcMode="spline"
             keySplines="0.4 0 0.2 1"/>
  </path>

  <!-- ── PUNTO INICIO ── -->
  <g>
    <circle cx="62" cy="760" r="14" fill="#0d0d1f" stroke="#FF6B6B" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
    </circle>
    <circle cx="62" cy="760" r="5" fill="#FF6B6B" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.3s" fill="freeze"/>
      <animate attributeName="r" values="5;8;5" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="784" text-anchor="middle" fill="#555577" font-size="9" letter-spacing="1" opacity="0">
      INICIO
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
    </text>
  </g>

  <!-- ── WAYPOINT 1 (INTELCIA) ── -->
  <g>
    <circle cx="300" cy="610" r="14" fill="#0d0d1f" stroke="#FF6B6B" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
    </circle>
    <circle cx="300" cy="610" r="6" fill="#FF6B6B" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.7s" fill="freeze"/>
      <animate attributeName="r" values="6;9;6" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <text x="300" y="595" text-anchor="middle" fill="#FF6B6B" font-size="9" font-weight="700" opacity="0">
      ◆ JUN 2025
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.8s" fill="freeze"/>
    </text>
    <!-- Conector al card -->
    <line x1="300" y1="624" x2="300" y2="660" stroke="#FF6B6B" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1s" fill="freeze"/>
    </line>
    <line x1="300" y1="660" x2="98" y2="660" stroke="#FF6B6B" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1.1s" fill="freeze"/>
    </line>
  </g>

  <!-- ── WAYPOINT 2 (KOOP) ── -->
  <g>
    <circle cx="530" cy="440" r="14" fill="#0d0d1f" stroke="#4ECDC4" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
    </circle>
    <circle cx="530" cy="440" r="6" fill="#4ECDC4" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
      <animate attributeName="r" values="6;9;6" dur="2.4s" begin="1.0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" begin="1.0s" repeatCount="indefinite"/>
    </circle>
    <text x="530" y="425" text-anchor="middle" fill="#4ECDC4" font-size="9" font-weight="700" opacity="0">
      ◆ OCT 2025
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.1s" fill="freeze"/>
    </text>
    <!-- Conector al card -->
    <line x1="530" y1="454" x2="530" y2="490" stroke="#4ECDC4" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1.3s" fill="freeze"/>
    </line>
    <line x1="530" y1="490" x2="392" y2="490" stroke="#4ECDC4" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1.4s" fill="freeze"/>
    </line>
  </g>

  <!-- ── WAYPOINT 3 (BARBERB) ── -->
  <g>
    <circle cx="740" cy="300" r="14" fill="#0d0d1f" stroke="#A78BFA" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>
    </circle>
    <circle cx="740" cy="300" r="6" fill="#A78BFA" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.3s" fill="freeze"/>
      <animate attributeName="r" values="6;9;6" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.3;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <text x="740" y="285" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="700" opacity="0">
      ◆ ABR 2024
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.4s" fill="freeze"/>
    </text>
    <!-- Conector al card -->
    <line x1="740" y1="314" x2="740" y2="345" stroke="#A78BFA" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1.6s" fill="freeze"/>
    </line>
    <line x1="740" y1="345" x2="766" y2="345" stroke="#A78BFA" stroke-width="1"
          stroke-dasharray="4 3" opacity="0.35">
      <animate attributeName="opacity" from="0" to="0.35" dur="0.4s" begin="1.7s" fill="freeze"/>
    </line>
  </g>

  <!-- ── PUNTO ACTUAL ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.6s" fill="freeze"/>
    <circle cx="960" cy="168" r="14" fill="#0d0d1f" stroke="#A78BFA" stroke-width="2"/>
    <circle cx="960" cy="168" r="5"  fill="#A78BFA">
      <animate attributeName="r" values="5;9;5" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <rect x="926" y="180" width="68" height="18" rx="9" fill="#A78BFA" opacity="0.2"/>
    <text x="960" y="193" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="700" letter-spacing="1">ACTUAL</text>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- ── CARD 1: INTELCIA ── -->
  <!-- ══════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="0.9s" fill="freeze"/>

    <!-- Sombra / glow del card -->
    <rect x="72" y="666" width="324" height="192" rx="14" fill="#FF6B6B" opacity="0.06"/>

    <!-- Card base -->
    <rect x="68" y="662" width="324" height="192" rx="14" fill="#13132a" stroke="#2a2a4e" stroke-width="1"/>
    <rect x="68" y="662" width="324" height="192" rx="14" fill="url(#cg1)"/>

    <!-- Borde izquierdo de color -->
    <rect x="68" y="662" width="5" height="192" rx="2.5" fill="#FF6B6B"/>

    <!-- Header badge -->
    <rect x="84" y="676" width="120" height="18" rx="9" fill="#FF6B6B" opacity="0.15"/>
    <text x="144" y="689" text-anchor="middle" fill="#FF6B6B" font-size="9" font-weight="700" letter-spacing="1">JUN 2025 — 2026</text>

    <!-- Título rol -->
    <text x="84" y="714" fill="white" font-size="14" font-weight="700">Data AI Quality Analyst</text>
    <text x="84" y="732" fill="#8888aa" font-size="11">INTELCIA S.A.S · Bogotá, Colombia</text>

    <!-- Separador -->
    <line x1="84" y1="740" x2="372" y2="740" stroke="#2a2a4e" stroke-width="0.8"/>

    <!-- Descripción -->
    <text x="84" y="756" fill="#aaaacc" font-size="10">Validación de modelos de IA en plataformas</text>
    <text x="84" y="771" fill="#aaaacc" font-size="10">e-commerce (Miravia, AliExpress). Métricas de</text>
    <text x="84" y="786" fill="#aaaacc" font-size="10">accuracy, CRISP-DM, KPIs y automatización.</text>

    <!-- Stack badges -->
    <rect x="84"  y="800" width="52" height="20" rx="6" fill="#FF6B6B" opacity="0.15"/>
    <text x="110" y="814" text-anchor="middle" fill="#FF6B6B" font-size="9" font-weight="600">Python</text>

    <rect x="142" y="800" width="54" height="20" rx="6" fill="#F2C811" opacity="0.15"/>
    <text x="169" y="814" text-anchor="middle" fill="#F2C811" font-size="9" font-weight="600">Power BI</text>

    <rect x="202" y="800" width="42" height="20" rx="6" fill="#217346" opacity="0.25"/>
    <text x="223" y="814" text-anchor="middle" fill="#52c98a" font-size="9" font-weight="600">Excel</text>

    <rect x="250" y="800" width="80" height="20" rx="6" fill="#0066FF" opacity="0.18"/>
    <text x="290" y="814" text-anchor="middle" fill="#60a0ff" font-size="9" font-weight="600">P. Automate</text>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- ── CARD 2: KOOP TECHNOLOGY ── -->
  <!-- ══════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.2s" fill="freeze"/>

    <rect x="72" y="496" width="324" height="192" rx="14" fill="#4ECDC4" opacity="0.06"/>
    <rect x="68" y="492" width="324" height="192" rx="14" fill="#13132a" stroke="#2a2a4e" stroke-width="1"/>
    <rect x="68" y="492" width="324" height="192" rx="14" fill="url(#cg2)"/>
    <rect x="68" y="492" width="5"   height="192" rx="2.5" fill="#4ECDC4"/>

    <rect x="84" y="506" width="140" height="18" rx="9" fill="#4ECDC4" opacity="0.15"/>
    <text x="154" y="519" text-anchor="middle" fill="#4ECDC4" font-size="9" font-weight="700" letter-spacing="1">OCT 2025 — ABR 2026</text>

    <text x="84" y="544" fill="white" font-size="14" font-weight="700">Backend Developer Jr</text>
    <text x="84" y="562" fill="#8888aa" font-size="11">Koop Technology · Prácticas</text>

    <line x1="84" y1="570" x2="372" y2="570" stroke="#2a2a4e" stroke-width="0.8"/>

    <text x="84" y="586" fill="#aaaacc" font-size="10">APIs REST en producción con FastAPI,</text>
    <text x="84" y="601" fill="#aaaacc" font-size="10">integradas a React. Code reviews, ORMs</text>
    <text x="84" y="616" fill="#aaaacc" font-size="10">y ceremonias ágiles en equipo.</text>

    <rect x="84"  y="630" width="52"  height="20" rx="6" fill="#4ECDC4" opacity="0.15"/>
    <text x="110" y="644" text-anchor="middle" fill="#4ECDC4" font-size="9" font-weight="600">Python</text>

    <rect x="142" y="630" width="56"  height="20" rx="6" fill="#009688" opacity="0.2"/>
    <text x="170" y="644" text-anchor="middle" fill="#4ECDC4" font-size="9" font-weight="600">FastAPI</text>

    <rect x="204" y="630" width="36"  height="20" rx="6" fill="#336791" opacity="0.25"/>
    <text x="222" y="644" text-anchor="middle" fill="#6ba3d6" font-size="9" font-weight="600">SQL</text>

    <rect x="246" y="630" width="44"  height="20" rx="6" fill="#61DAFB" opacity="0.12"/>
    <text x="268" y="644" text-anchor="middle" fill="#61DAFB" font-size="9" font-weight="600">React</text>

    <rect x="296" y="630" width="36"  height="20" rx="6" fill="#F05032" opacity="0.18"/>
    <text x="314" y="644" text-anchor="middle" fill="#F05032" font-size="9" font-weight="600">Git</text>
  </g>

  <!-- ══════════════════════════════════════ -->
  <!-- ── CARD 3: BARBERB ── -->
  <!-- ══════════════════════════════════════ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.7s" begin="1.5s" fill="freeze"/>

    <rect x="770" y="351" width="324" height="200" rx="14" fill="#A78BFA" opacity="0.06"/>
    <rect x="766" y="347" width="324" height="200" rx="14" fill="#13132a" stroke="#2a2a4e" stroke-width="1"/>
    <rect x="766" y="347" width="324" height="200" rx="14" fill="url(#cg3)"/>
    <rect x="766" y="347" width="5"   height="200" rx="2.5" fill="#A78BFA"/>

    <rect x="782" y="361" width="140" height="18" rx="9" fill="#A78BFA" opacity="0.15"/>
    <text x="852" y="374" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="700" letter-spacing="1">ABR 2024 — JUL 2025</text>

    <text x="782" y="400" fill="white" font-size="14" font-weight="700">Full Stack Developer</text>
    <text x="782" y="418" fill="#8888aa" font-size="11">BarberB — Tecnoparque · Freelance</text>

    <line x1="782" y1="426" x2="1070" y2="426" stroke="#2a2a4e" stroke-width="0.8"/>

    <text x="782" y="442" fill="#aaaacc" font-size="10">ERP modular para PYMEs: arquitectura</text>
    <text x="782" y="457" fill="#aaaacc" font-size="10">Django, auth, MySQL, dashboard AJAX</text>
    <text x="782" y="472" fill="#aaaacc" font-size="10">en tiempo real y despliegue en GCP.</text>

    <rect x="782" y="488" width="56"  height="20" rx="6" fill="#A78BFA" opacity="0.15"/>
    <text x="810" y="502" text-anchor="middle" fill="#A78BFA" font-size="9" font-weight="600">Python</text>

    <rect x="844" y="488" width="52"  height="20" rx="6" fill="#092E20" opacity="0.6"/>
    <text x="870" y="502" text-anchor="middle" fill="#44ff99" font-size="9" font-weight="600">Django</text>

    <rect x="902" y="488" width="46"  height="20" rx="6" fill="#005C84" opacity="0.4"/>
    <text x="925" y="502" text-anchor="middle" fill="#66ccff" font-size="9" font-weight="600">MySQL</text>

    <rect x="954" y="488" width="40"  height="20" rx="6" fill="#4285F4" opacity="0.18"/>
    <text x="974" y="502" text-anchor="middle" fill="#80aaff" font-size="9" font-weight="600">GCP</text>
  </g>

  <!-- ── FOOTER ── -->
  <text x="550" y="818" text-anchor="middle" fill="#333355" font-size="9" letter-spacing="4">
    ✦ 2024 — 2026  ·  TRAYECTORIA EN EVOLUCIÓN  ✦
  </text>

</svg>
