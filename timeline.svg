  </path>

  <!-- ── PUNTO INICIO ── -->
  <g>
    <circle cx="80" cy="780" r="14" fill="#0d0d1f" stroke="#A78BFA" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
    </circle>
    <circle cx="80" cy="780" r="5" fill="#A78BFA" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.4s" begin="0.4s" fill="freeze"/>
      <animate attributeName="r" values="5;8;5" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <text x="80" y="810" text-anchor="middle" fill="#555577" font-size="9" letter-spacing="1" opacity="0">
