  <text x="550" y="76" text-anchor="middle" fill="#666688"
        font-size="11" letter-spacing="6"> 2024 — 2026</text>
  <rect x="375" y="88" width="350" height="1.5" rx="1" fill="url(#pathGrad)" opacity="0.4"/>

  <!-- ── STATS BAR (NUEVO - Mejora UX) ── -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.8s" begin="0.2s" fill="freeze"/>
    <rect x="350" y="105" width="400" height="30" rx="15" fill="#1a1a35" stroke="#2a2a4e" stroke-width="1"/>
    <text x="410" y="124" text-anchor="middle" fill="#FF6B6B" font-size="11" font-weight="700">⚡ 2+ AÑOS</text>
    <line x1="470" y1="112" x2="470" y2="128" stroke="#2a2a4e" stroke-width="1"/>
    <text x="520" y="124" text-anchor="middle" fill="#4ECDC4" font-size="11" font-weight="700">🏢 3 ROLES</text>
    <line x1="570" y1="112" x2="570" y2="128" stroke="#2a2a4e" stroke-width="1"/>
    <text x="630" y="124" text-anchor="middle" fill="#A78BFA" font-size="11" font-weight="700">🚀 10+ PROYECTOS</text>
  </g>

